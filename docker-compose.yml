services:
  zenodo-mcp-server:
    build: .
    image: ghcr.io/eic/zenodo-mcp-server:latest
    container_name: zenodo-mcp-server
    stdin_open: true
    environment:
      ZENODO_BASE_URL: ${ZENODO_BASE_URL:-https://zenodo.org}
      ZENODO_API_KEY: ${ZENODO_API_KEY:-}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
