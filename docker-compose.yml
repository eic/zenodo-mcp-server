services:
  zenodo-mcp-server:
    build: .
    image: ghcr.io/eic/zenodo-mcp-server:latest
    container_name: zenodo-mcp-server
    stdin_open: true
    tty: true
    environment:
      ZENODO_BASE_URL: ${ZENODO_BASE_URL:-https://zenodo.org}
      ZENODO_API_KEY: ${ZENODO_API_KEY:-}
      ZENODO_ALLOW_WRITE: ${ZENODO_ALLOW_WRITE:-false}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
