services:
  zenodo-mcp-server:
    build: .
    image: ghcr.io/eic/zenodo-mcp-server:latest
    container_name: zenodo-mcp-server
    stdin_open: true
    environment:
      ZENODO_BASE_URL: ${ZENODO_BASE_URL:-https://zenodo.org}
      ZENODO_API_KEY: ${ZENODO_API_KEY:-}
      ZENODO_ALLOW_WRITE: ${ZENODO_ALLOW_WRITE:-false}
      ZENODO_COMMUNITY: ${ZENODO_COMMUNITY:-}
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # Watchtower automatically pulls and restarts the zenodo-mcp-server container
  # whenever a new image is published to ghcr.io.
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: zenodo-mcp-server-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Only watch the zenodo-mcp-server container (not watchtower itself)
    command: zenodo-mcp-server
    environment:
      # Check for updates every hour (3600 seconds). Override via env var.
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-3600}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    restart: unless-stopped
