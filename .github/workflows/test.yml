name: Test

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage
        timeout-minutes: 5
        env:
          ZENODO_BASE_URL: https://zenodo.org
          ZENODO_API_KEY: ${{ secrets.ZENODO_API_KEY }}
          ZENODO_SANDBOX_API_KEY: ${{ secrets.ZENODO_SANDBOX_API_KEY }}
          ZENODO_ALLOW_WRITE: ${{ secrets.ZENODO_SANDBOX_API_KEY != '' && 'true' || 'false' }}

      - name: Generate test summary
        if: always()
        run: node scripts/test-summary.js
        env:
          ZENODO_BASE_URL: https://zenodo.org
          ZENODO_API_KEY: ${{ secrets.ZENODO_API_KEY }}
          ZENODO_SANDBOX_API_KEY: ${{ secrets.ZENODO_SANDBOX_API_KEY }}
          ZENODO_ALLOW_WRITE: ${{ secrets.ZENODO_SANDBOX_API_KEY != '' && 'true' || 'false' }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
